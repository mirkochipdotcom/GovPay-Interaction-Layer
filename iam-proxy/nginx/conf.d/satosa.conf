server {
    listen 80 #SSL_MARKER#;
    server_name _;

    # Defer DNS resolution for Docker service names
    resolver 127.0.0.11 ipv6=off;
    resolver_timeout 5s;
    client_body_timeout 120s;
    client_header_timeout 120s;

#CERT_MARKER_1#
#CERT_MARKER_2#

    root /usr/share/nginx/html;

    # Redirect root to Discovery Service page
    location = / {
        return 302 /static/disco.html$is_args$args;
    }

    # File statici: servi dal disco, 404 se non esistono (non proxiare a SATOSA)
    location /static/ {
        try_files $uri $uri/ =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Tutto il resto: prova prima come file, poi proxy a SATOSA
    location / {
        try_files $uri $uri/index.html @satosa;
    }

    location @satosa {
      include /etc/nginx/uwsgi_params;
      set $satosa_upstream iam-proxy-italia:10000;
      uwsgi_pass $satosa_upstream;

      uwsgi_param Host $host;
      uwsgi_param X-Real-IP $remote_addr;
      uwsgi_param X-Forwarded-For $proxy_add_x_forwarded_for;
      uwsgi_param X-Forwarded-Proto #PROTO_MARKER#;
      uwsgi_param HTTP_X_FORWARDED_PROTOCOL #PROTO_MARKER#;

      uwsgi_connect_timeout 75s;
      uwsgi_read_timeout 40;
      uwsgi_buffer_size 128k;
      uwsgi_buffers 4 256k;
      uwsgi_busy_buffers_size 256k;
      uwsgi_param SERVER_ADDR $server_addr;

      # Intercetta gli errori HTTP restituiti da SATOSA (es. 403 su annullamento login)
      uwsgi_intercept_errors on;

      # Retry on connection errors
      error_page 502 503 504 =502 /errors/50x.html;
    }

    error_page 404 /errors/404.html;
    location = /errors/404.html {
        root /usr/share/nginx/html;
    }

    # 403 da SATOSA (es. login annullato dall'utente): redirect configurabile
    error_page 403 =302 #ERROR_REDIRECT_URL#;

    # Fallback locale 403 (nginx diretto, non da proxy)
    location = /errors/403.html {
        root /usr/share/nginx/html;
    }

    error_page 500 502 503 504 /errors/50x.html;
    location = /errors/50x.html {
        root /usr/share/nginx/html;
    }
}

