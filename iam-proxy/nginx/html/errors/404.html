<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pagina non trovata &#8211; #ORG_NAME#</title>
  <link href="/static/css/bootstrap-italia.min.css" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; min-height: 100vh; background: #f5f7fa; font-family: 'Titillium Web', sans-serif; }
    .it-header-slim-wrapper { background: #0072CE; padding: 0.75rem 0; }
    .it-header-slim-wrapper a { color: #fff; text-decoration: none; font-weight: 600; font-size: 1rem; }
    .it-header-center-wrapper { background: #F2F7FC; padding: 0.75rem 0; border-bottom: 1px solid #e0e6ed; }
    .it-header-center-wrapper .header-inner { display: flex; align-items: center; gap: 12px; }
    .it-header-center-wrapper img { height: 48px; }
    .it-header-center-wrapper .org-display-name { font-size: 1.1rem; font-weight: 600; color: #17324d; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }
    .error-card { background: #fff; border-radius: 6px; box-shadow: 0 2px 16px rgba(0,0,0,0.09); max-width: 580px; width: 100%; padding: 3rem 2.5rem; text-align: center; }
    .error-code { font-size: 5rem; font-weight: 900; color: #e0e6ed; line-height: 1; margin-bottom: 0; }
    .error-card h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem; color: #17324d; }
    .error-card .lead { color: #5c6f82; line-height: 1.7; margin-bottom: 0.5rem; font-size: 1rem; }
    .error-card .hint { color: #8898a4; font-size: 0.9rem; margin-bottom: 2rem; }
    .btn-back { display: inline-block; background: #0073e6; color: #fff; padding: 0.75rem 2rem; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 1rem; transition: background 0.2s; }
    .btn-back:hover { background: #0059c0; color: #fff; text-decoration: none; }
    footer { background: #0072CE; color: #fff; padding: 1.25rem 0; }
    footer a { color: #fff; text-decoration: none; margin-right: 1.5rem; font-size: 0.9rem; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="it-header-slim-wrapper">
    <div class="container">
      <a href="#ORG_URL#">#ORG_NAME#</a>
    </div>
  </div>
  <div class="it-header-center-wrapper">
    <div class="container">
      <div class="header-inner">
        <img src="#ORG_LOGO#" alt="#ORG_NAME#" onerror="this.style.display='none'">
        <span class="org-display-name">#ORG_DISPLAY_NAME#</span>
      </div>
    </div>
  </div>

  <!-- Content -->
  <main>
    <div class="error-card">

      <p class="error-code">404</p>
      <h1>Pagina non trovata</h1>
      <p class="lead">La pagina che stai cercando non &#232; disponibile.</p>
      <p class="hint">Potrebbe essere stata spostata, rimossa, oppure l'indirizzo potrebbe non essere corretto.</p>

      <a href="#FRONTOFFICE_URL#" class="btn-back">Torna al servizio</a>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="container">
      <a href="#LEGAL_URL#" target="_blank" rel="noopener">Note legali</a>
      <a href="#PRIVACY_URL#" target="_blank" rel="noopener">Privacy policy</a>
      <a href="#ACCESSIBILITY_URL#" target="_blank" rel="noopener">Accessibilità</a>
      <span style="margin-left:auto; font-size:0.8rem; opacity:0.75;">
        <a href="https://github.com/Comune-di-Montesilvano/GovPay-Interaction-Layer/releases/tag/#APP_VERSION#"
           target="_blank" rel="noopener noreferrer" style="color:#fff; text-decoration:none;">
          IAMProxy@GovPayInteractionLayer #APP_VERSION#
        </a>
      </span>
    </div>
  </footer>

</body>
</html>
