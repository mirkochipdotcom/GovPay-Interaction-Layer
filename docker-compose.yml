services:
  govpay-interaction-backoffice:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-backoffice:${APP_VERSION:-latest}
    container_name: govpay-interaction-backoffice
    ports:
      - "${BACKOFFICE_HTTP_PORT:-8443}:80"
    volumes:
      - frontoffice_sp_metadata:/var/www/html/metadata-sp:ro
      - frontoffice_sp_metadata:/metadata/sp:ro
      - ./certificate:/var/www/certificate:ro
      - ./img:/var/www/html/public/img:ro
    environment:
      - SSL=${SSL}
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME}
      - COMPOSER_VENDOR_DIR=/var/www/html/vendor
      - APP_SUITE=backoffice
      - APP_DEBUG=${APP_DEBUG}
      - ENABLE_DEBUG_TOOL=${ENABLE_DEBUG_TOOL}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_SUFFIX=${APP_ENTITY_SUFFIX}
      - APP_ENTITY_GOVERNMENT=${APP_ENTITY_GOVERNMENT}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_SUPPORT_PHONE=${APP_SUPPORT_PHONE}
      - APP_SUPPORT_HOURS=${APP_SUPPORT_HOURS}
      - APP_SUPPORT_LOCATION=${APP_SUPPORT_LOCATION}
      - APP_LOGO_SRC=${APP_LOGO_SRC}
      - APP_LOGO_TYPE=${APP_LOGO_TYPE}
      - ID_DOMINIO=${ID_DOMINIO}
      - ID_A2A=${ID_A2A}
      - URL_ENTE=${URL_ENTE}
      - PAGOPA_CHECKOUT_EC_BASE_URL=${PAGOPA_CHECKOUT_EC_BASE_URL}
      - PAGOPA_CHECKOUT_SUBSCRIPTION_KEY=${PAGOPA_CHECKOUT_SUBSCRIPTION_KEY}
      - PAGOPA_CHECKOUT_COMPANY_NAME=${PAGOPA_CHECKOUT_COMPANY_NAME}
      - PAGOPA_CHECKOUT_RETURN_OK_URL=${PAGOPA_CHECKOUT_RETURN_OK_URL}
      - PAGOPA_CHECKOUT_RETURN_CANCEL_URL=${PAGOPA_CHECKOUT_RETURN_CANCEL_URL}
      - PAGOPA_CHECKOUT_RETURN_ERROR_URL=${PAGOPA_CHECKOUT_RETURN_ERROR_URL}
      - PAGOPA_PAYMENT_OPTIONS_URL=${PAGOPA_PAYMENT_OPTIONS_URL}
      - PAGOPA_PAYMENT_OPTIONS_KEY=${PAGOPA_PAYMENT_OPTIONS_KEY}
      - GOVPAY_PENDENZE_URL=${GOVPAY_PENDENZE_URL}
      - GOVPAY_PAGAMENTI_URL=${GOVPAY_PAGAMENTI_URL}
      - GOVPAY_RAGIONERIA_URL=${GOVPAY_RAGIONERIA_URL}
      - GOVPAY_BACKOFFICE_URL=${GOVPAY_BACKOFFICE_URL}
      - GOVPAY_PENDENZE_PATCH_URL=${GOVPAY_PENDENZE_PATCH_URL}
      - AUTHENTICATION_GOVPAY=${AUTHENTICATION_GOVPAY}
      - BIZ_EVENTS_API_KEY=${BIZ_EVENTS_API_KEY}
      - BIZ_EVENTS_HOST=${BIZ_EVENTS_HOST}
      - BACKOFFICE_MAILER_DSN=${BACKOFFICE_MAILER_DSN}
      - BACKOFFICE_MAILER_FROM_ADDRESS=${BACKOFFICE_MAILER_FROM_ADDRESS}
      - BACKOFFICE_MAILER_FROM_NAME=${BACKOFFICE_MAILER_FROM_NAME}
      - BACKOFFICE_PUBLIC_BASE_URL=${BACKOFFICE_PUBLIC_BASE_URL}
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - GOVPAY_USER=${GOVPAY_USER}
      - GOVPAY_PASSWORD=${GOVPAY_PASSWORD}
      - GOVPAY_TLS_CERT=${GOVPAY_TLS_CERT}
      - GOVPAY_TLS_KEY=${GOVPAY_TLS_KEY}
      - TASSONOMIE_PAGOPA=${TASSONOMIE_PAGOPA}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      # env_file_ rimosso per sicurezza (isolamento esplicito)
      # - .env.backoffice (rimosso: mantenere solo .env locale)
    depends_on:
      - db
    entrypoint: [ "/usr/local/bin/docker-setup.sh" ] # Esegue script di setup (composer/autoload + cert) poi CMD apache
    restart: unless-stopped
    networks:
      - govpay-network
  govpay-interaction-frontoffice:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-frontoffice:${APP_VERSION:-latest}
    container_name: govpay-interaction-frontoffice
    ports:
      - "${FRONTOFFICE_HTTP_PORT:-8444}:80"
    volumes:
      - frontoffice_sp_metadata:/var/www/html/metadata-sp:ro
      - frontoffice_sp_metadata:/metadata/sp:ro
      - spid_certs:/var/www/html/spid-certs:ro
      - ./certificate:/var/www/certificate:ro
      - ./img:/var/www/html/public/img:ro
    environment:
      - SSL=${SSL}
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME}
      - COMPOSER_VENDOR_DIR=/var/www/html/vendor
      - APP_DEBUG=${APP_DEBUG}
      - ENABLE_DEBUG_TOOL=${ENABLE_DEBUG_TOOL}
      - APP_SUITE=frontoffice
      - DB_NAME=${DB_NAME_CITTADINI}
      - DB_USER=${DB_USER_CITTADINI}
      - DB_PASSWORD=${DB_PASSWORD_CITTADINI}
      - FRONTOFFICE_AUTH_PROXY_TYPE=${FRONTOFFICE_AUTH_PROXY_TYPE:-iam-proxy-saml2}
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - APP_ENTITY_IPA_CODE=${APP_ENTITY_IPA_CODE}
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_SUFFIX=${APP_ENTITY_SUFFIX}
      - APP_ENTITY_GOVERNMENT=${APP_ENTITY_GOVERNMENT}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_SUPPORT_PHONE=${APP_SUPPORT_PHONE}
      - APP_SUPPORT_HOURS=${APP_SUPPORT_HOURS}
      - APP_SUPPORT_LOCATION=${APP_SUPPORT_LOCATION}
      - APP_LOGO_SRC=${APP_LOGO_SRC}
      - APP_LOGO_TYPE=${APP_LOGO_TYPE}
      - ID_DOMINIO=${ID_DOMINIO}
      - ID_A2A=${ID_A2A}
      - URL_ENTE=${URL_ENTE}
      - PAGOPA_CHECKOUT_EC_BASE_URL=${PAGOPA_CHECKOUT_EC_BASE_URL}
      - PAGOPA_CHECKOUT_SUBSCRIPTION_KEY=${PAGOPA_CHECKOUT_SUBSCRIPTION_KEY}
      - PAGOPA_CHECKOUT_COMPANY_NAME=${PAGOPA_CHECKOUT_COMPANY_NAME}
      - PAGOPA_CHECKOUT_RETURN_OK_URL=${PAGOPA_CHECKOUT_RETURN_OK_URL}
      - PAGOPA_CHECKOUT_RETURN_CANCEL_URL=${PAGOPA_CHECKOUT_RETURN_CANCEL_URL}
      - PAGOPA_CHECKOUT_RETURN_ERROR_URL=${PAGOPA_CHECKOUT_RETURN_ERROR_URL}
      - PAGOPA_PAYMENT_OPTIONS_URL=${PAGOPA_PAYMENT_OPTIONS_URL}
      - PAGOPA_PAYMENT_OPTIONS_KEY=${PAGOPA_PAYMENT_OPTIONS_KEY}
      - GOVPAY_PENDENZE_URL=${GOVPAY_PENDENZE_URL}
      - GOVPAY_PAGAMENTI_URL=${GOVPAY_PAGAMENTI_URL}
      - GOVPAY_RAGIONERIA_URL=${GOVPAY_RAGIONERIA_URL}
      - GOVPAY_BACKOFFICE_URL=${GOVPAY_BACKOFFICE_URL}
      - GOVPAY_PENDENZE_PATCH_URL=${GOVPAY_PENDENZE_PATCH_URL}
      - AUTHENTICATION_GOVPAY=${AUTHENTICATION_GOVPAY}
      - GOVPAY_USER=${GOVPAY_USER}
      - GOVPAY_PASSWORD=${GOVPAY_PASSWORD}
      - GOVPAY_TLS_CERT=${GOVPAY_TLS_CERT}
      - GOVPAY_TLS_KEY=${GOVPAY_TLS_KEY}
      - TASSONOMIE_PAGOPA=${TASSONOMIE_PAGOPA}
      - COMPOSE_PROFILES=${COMPOSE_PROFILES}
      - APP_ENCRYPTION_KEY=${APP_ENCRYPTION_KEY}
      - IAM_PROXY_SAML2_IDP_METADATA_URL_INTERNAL=${IAM_PROXY_SAML2_IDP_METADATA_URL_INTERNAL:-http://satosa-nginx:80/Saml2IDP/metadata}
      - IAM_PROXY_PUBLIC_BASE_URL=${IAM_PROXY_PUBLIC_BASE_URL}
      - IAM_PROXY_DEBUG=${IAM_PROXY_DEBUG:-false}
    depends_on:
      - db
    entrypoint: [ "/usr/local/bin/docker-setup.sh" ]
    restart: unless-stopped
    networks:
      - govpay-network

  init-frontoffice-sp-metadata:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-frontoffice:${APP_VERSION:-latest}
    container_name: init-frontoffice-sp-metadata
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sh /scripts/ensure-sp-metadata.sh
    volumes:
      - frontoffice_sp_metadata:/metadata/sp
      - frontoffice_sp_metadata:/var/www/html/metadata-sp
      - spid_certs:/var/www/html/spid-certs:ro
    environment:
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS=${FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS:-365}
      - FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS=${FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS:-604800}
      - FRONTOFFICE_SAML_SP_X509CERT=/var/www/html/spid-certs/cert.pem
      - FRONTOFFICE_SAML_SP_PRIVATEKEY=/var/www/html/spid-certs/privkey.pem
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_SUFFIX=${APP_ENTITY_SUFFIX}
      - APP_ENTITY_IPA_CODE=${APP_ENTITY_IPA_CODE}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_SUPPORT_PHONE=${APP_SUPPORT_PHONE}
      - ID_DOMINIO=${ID_DOMINIO}
    profiles:
      - iam-proxy

  refresh-frontoffice-sp-metadata:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-frontoffice:${APP_VERSION:-latest}
    container_name: refresh-frontoffice-sp-metadata
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          sh /scripts/ensure-sp-metadata.sh || true
          sleep ${FRONTOFFICE_SP_METADATA_REFRESH_SECONDS:-21600}
        done
    volumes:
      - frontoffice_sp_metadata:/metadata/sp
      - frontoffice_sp_metadata:/var/www/html/metadata-sp
      - spid_certs:/var/www/html/spid-certs:ro
    environment:
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS=${FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS:-365}
      - FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS=${FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS:-604800}
      - FRONTOFFICE_SAML_SP_X509CERT=/var/www/html/spid-certs/cert.pem
      - FRONTOFFICE_SAML_SP_PRIVATEKEY=/var/www/html/spid-certs/privkey.pem
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_SUFFIX=${APP_ENTITY_SUFFIX}
      - APP_ENTITY_IPA_CODE=${APP_ENTITY_IPA_CODE}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_SUPPORT_PHONE=${APP_SUPPORT_PHONE}
      - ID_DOMINIO=${ID_DOMINIO}
    depends_on:
      init-frontoffice-sp-metadata:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles:
      - iam-proxy

  iam-proxy-italia:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-iam-proxy-italia:${APP_VERSION:-latest}
    container_name: iam-proxy-italia
    command: ["/bin/bash", "/builder/startup.sh"]
    volumes:
      # Chiavi JWK CIE OIDC (per-deployment, generate da metadata-builder setup-cieoidc)
      - ./metadata/cieoidc-keys:/cieoidc-keys:ro
      # SP metadata del frontoffice (non annidato: nessun problema Docker Desktop Windows)
      - frontoffice_sp_metadata:/frontoffice-sp:ro
      # Certificati SPID (per-deployment)
      - spid_certs:/satosa_proxy/pki
      # File statici condivisi con satosa-nginx (popolati da startup.sh)
      - iam_proxy_static:/satosa-static
    profiles:
      - iam-proxy
    depends_on:
      init-frontoffice-sp-metadata:
        condition: service_completed_successfully
    environment:
      - SATOSA_BY_DOCKER=1
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_IPA_CODE=${APP_ENTITY_IPA_CODE}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_LOGO_SRC=${APP_LOGO_SRC}
      - APP_LOGO_TYPE=${APP_LOGO_TYPE}
      - APP_VERSION=${APP_VERSION:-}
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - IAM_PROXY_DEBUG=${IAM_PROXY_DEBUG}
      - FRONTOFFICE_AUTH_PROXY_TYPE=${FRONTOFFICE_AUTH_PROXY_TYPE}
      - FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS=${FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS}
      - FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS=${FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS}
      - SPID_CERT_LOCALITY_NAME=${SPID_CERT_LOCALITY_NAME}
      - SPID_CERT_ORG_ID=${SPID_CERT_ORG_ID}
      - SPID_CERT_ORG_NAME=${SPID_CERT_ORG_NAME}
      - SPID_CERT_COMMON_NAME=${SPID_CERT_COMMON_NAME}
      - SPID_CERT_ENTITY_ID=${SPID_CERT_ENTITY_ID}
      - SPID_CERT_KEY_SIZE=${SPID_CERT_KEY_SIZE}
      - SPID_CERT_DAYS=${SPID_CERT_DAYS}
      - SPID_CERT_SECTOR=${SPID_CERT_SECTOR}
      - SPID_CERTS_DOCKER_VOLUME=${SPID_CERTS_DOCKER_VOLUME}
      - IAM_PROXY_SAML2_IDP_METADATA_URL=${IAM_PROXY_SAML2_IDP_METADATA_URL}
      - IAM_PROXY_SAML2_IDP_METADATA_URL_INTERNAL=${IAM_PROXY_SAML2_IDP_METADATA_URL_INTERNAL}
      - IAM_PROXY_HOSTNAME=${IAM_PROXY_HOSTNAME}
      - IAM_PROXY_HTTP_PORT=${IAM_PROXY_HTTP_PORT}
      - SATOSA_HOSTNAME=${SATOSA_HOSTNAME}
      - SATOSA_BASE=${SATOSA_BASE}
      - SATOSA_BASE_STATIC=${SATOSA_BASE_STATIC}
      - SATOSA_DISCO_SRV=${SATOSA_DISCO_SRV}
      - SATOSA_SALT=${SATOSA_SALT}
      - SATOSA_STATE_ENCRYPTION_KEY=${SATOSA_STATE_ENCRYPTION_KEY}
      - SATOSA_ENCRYPTION_KEY=${SATOSA_ENCRYPTION_KEY}
      - SATOSA_USER_ID_HASH_SALT=${SATOSA_USER_ID_HASH_SALT}
      - SATOSA_UNKNOW_ERROR_REDIRECT_PAGE=${SATOSA_UNKNOW_ERROR_REDIRECT_PAGE}
      - SATOSA_CANCEL_REDIRECT_URL=${SATOSA_CANCEL_REDIRECT_URL}
      - SATOSA_PRIVATE_KEY=${SATOSA_PRIVATE_KEY}
      - SATOSA_PUBLIC_KEY=${SATOSA_PUBLIC_KEY}
      - SATOSA_ORGANIZATION_DISPLAY_NAME_IT=${SATOSA_ORGANIZATION_DISPLAY_NAME_IT}
      - SATOSA_ORGANIZATION_DISPLAY_NAME_EN=${SATOSA_ORGANIZATION_DISPLAY_NAME_EN}
      - SATOSA_ORGANIZATION_NAME_IT=${SATOSA_ORGANIZATION_NAME_IT}
      - SATOSA_ORGANIZATION_NAME_EN=${SATOSA_ORGANIZATION_NAME_EN}
      - SATOSA_ORGANIZATION_URL_IT=${SATOSA_ORGANIZATION_URL_IT}
      - SATOSA_ORGANIZATION_URL_EN=${SATOSA_ORGANIZATION_URL_EN}
      - SATOSA_CONTACT_PERSON_GIVEN_NAME=${SATOSA_CONTACT_PERSON_GIVEN_NAME}
      - SATOSA_CONTACT_PERSON_EMAIL_ADDRESS=${SATOSA_CONTACT_PERSON_EMAIL_ADDRESS}
      - SATOSA_CONTACT_PERSON_TELEPHONE_NUMBER=${SATOSA_CONTACT_PERSON_TELEPHONE_NUMBER}
      - SATOSA_CONTACT_PERSON_FISCALCODE=${SATOSA_CONTACT_PERSON_FISCALCODE}
      - SATOSA_CONTACT_PERSON_IPA_CODE=${SATOSA_CONTACT_PERSON_IPA_CODE}
      - SATOSA_ORGANIZATION_IDENTIFIER=${SATOSA_ORGANIZATION_IDENTIFIER}
      - SATOSA_CONTACT_PERSON_MUNICIPALITY=${SATOSA_CONTACT_PERSON_MUNICIPALITY}
      - SATOSA_UI_DISPLAY_NAME_IT=${SATOSA_UI_DISPLAY_NAME_IT}
      - SATOSA_UI_DISPLAY_NAME_EN=${SATOSA_UI_DISPLAY_NAME_EN}
      - SATOSA_UI_DESCRIPTION_IT=${SATOSA_UI_DESCRIPTION_IT}
      - SATOSA_UI_DESCRIPTION_EN=${SATOSA_UI_DESCRIPTION_EN}
      - SATOSA_UI_INFORMATION_URL_IT=${SATOSA_UI_INFORMATION_URL_IT}
      - SATOSA_UI_INFORMATION_URL_EN=${SATOSA_UI_INFORMATION_URL_EN}
      - SATOSA_UI_PRIVACY_URL_IT=${SATOSA_UI_PRIVACY_URL_IT}
      - SATOSA_UI_PRIVACY_URL_EN=${SATOSA_UI_PRIVACY_URL_EN}
      - SATOSA_UI_LEGAL_URL_IT=${SATOSA_UI_LEGAL_URL_IT}
      - SATOSA_UI_LEGAL_URL_EN=${SATOSA_UI_LEGAL_URL_EN}
      - SATOSA_UI_ACCESSIBILITY_URL_IT=${SATOSA_UI_ACCESSIBILITY_URL_IT}
      - SATOSA_UI_ACCESSIBILITY_URL_EN=${SATOSA_UI_ACCESSIBILITY_URL_EN}
      - SATOSA_UI_LOGO_URL=${SATOSA_UI_LOGO_URL}
      - SATOSA_UI_LOGO_WIDTH=${SATOSA_UI_LOGO_WIDTH}
      - SATOSA_UI_LOGO_HEIGHT=${SATOSA_UI_LOGO_HEIGHT}
      - SATOSA_GET_SPID_IDP_METADATA=${SATOSA_GET_SPID_IDP_METADATA}
      - SATOSA_GET_CIE_IDP_METADATA=${SATOSA_GET_CIE_IDP_METADATA}
      - SATOSA_GET_FICEP_IDP_METADATA=${SATOSA_GET_FICEP_IDP_METADATA}
      - SATOSA_GET_IDEM_MDQ_KEY=${SATOSA_GET_IDEM_MDQ_KEY}
      - SATOSA_USE_DEMO_SPID_IDP=${SATOSA_USE_DEMO_SPID_IDP}
      - SATOSA_USE_SPID_VALIDATOR=${SATOSA_USE_SPID_VALIDATOR}
      - SATOSA_SPID_VALIDATOR_METADATA_URL=${SATOSA_SPID_VALIDATOR_METADATA_URL}
      - CIE_OIDC_PROVIDER_URL=${CIE_OIDC_PROVIDER_URL}
      - CIE_OIDC_TRUST_ANCHOR_URL=${CIE_OIDC_TRUST_ANCHOR_URL}
      - CIE_OIDC_AUTHORITY_HINT_URL=${CIE_OIDC_AUTHORITY_HINT_URL}
      - CIE_OIDC_CLIENT_ID=${CIE_OIDC_CLIENT_ID}
      - CIE_OIDC_CLIENT_NAME=${CIE_OIDC_CLIENT_NAME}
      - CIE_OIDC_ORGANIZATION_NAME=${CIE_OIDC_ORGANIZATION_NAME}
      - CIE_OIDC_JWKS_URI=${CIE_OIDC_JWKS_URI}
      - CIE_OIDC_SIGNED_JWKS_URI=${CIE_OIDC_SIGNED_JWKS_URI}
      - CIE_OIDC_REDIRECT_URI=${CIE_OIDC_REDIRECT_URI}
      - CIE_OIDC_FEDERATION_RESOLVE_ENDPOINT=${CIE_OIDC_FEDERATION_RESOLVE_ENDPOINT}
      - CIE_OIDC_FEDERATION_FETCH_ENDPOINT=${CIE_OIDC_FEDERATION_FETCH_ENDPOINT}
      - CIE_OIDC_FEDERATION_TRUST_MARK_STATUS_ENDPOINT=${CIE_OIDC_FEDERATION_TRUST_MARK_STATUS_ENDPOINT}
      - CIE_OIDC_FEDERATION_LIST_ENDPOINT=${CIE_OIDC_FEDERATION_LIST_ENDPOINT}
      - CIE_OIDC_HOMEPAGE_URI=${CIE_OIDC_HOMEPAGE_URI}
      - CIE_OIDC_POLICY_URI=${CIE_OIDC_POLICY_URI}
      - CIE_OIDC_LOGO_URI=${CIE_OIDC_LOGO_URI}
      - CIE_OIDC_CONTACT_EMAIL=${CIE_OIDC_CONTACT_EMAIL}
      - ENABLE_SPID=${ENABLE_SPID}
      - ENABLE_CIE_OIDC=${ENABLE_CIE_OIDC}
      - ENABLE_IT_WALLET=${ENABLE_IT_WALLET}
      - ENABLE_OIDCOP=${ENABLE_OIDCOP}
      - ENABLE_IDEM=${ENABLE_IDEM}
      - ENABLE_EIDAS=${ENABLE_EIDAS}
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_HOST=${MONGODB_HOST}
      - MONGODB_PORT=${MONGODB_PORT}
      - MONGODB_DB=${MONGODB_DB}
      - SATOSA_DISABLE_CIEOIDC_BACKEND=${SATOSA_DISABLE_CIEOIDC_BACKEND}
      - SATOSA_DISABLE_PYEUDIW_BACKEND=${SATOSA_DISABLE_PYEUDIW_BACKEND}
      - FRONTOFFICE_SP_METADATA_FILE=${FRONTOFFICE_SP_METADATA_FILE}
      - FRONTOFFICE_SP_METADATA_WARN_WINDOW_SECONDS=${FRONTOFFICE_SP_METADATA_WARN_WINDOW_SECONDS}
      - FRONTOFFICE_SP_METADATA_CHECK_INTERVAL_SECONDS=${FRONTOFFICE_SP_METADATA_CHECK_INTERVAL_SECONDS}
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "test", "-f", "/satosa_proxy/entrypoint.sh"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 30s
    networks:
      - govpay-network

  satosa-nginx:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-iam-proxy-nginx:${APP_VERSION:-latest}
    container_name: satosa-nginx
    profiles:
      - iam-proxy
    depends_on:
      iam-proxy-italia:
        condition: service_started
    ports:
      - "${IAM_PROXY_HTTP_PORT:-9445}:80"
    environment:
      - SSL=${SSL:-on}
      - NGINX_HOST=${IAM_PROXY_HOSTNAME:-satosa-nginx}
      - TZ=${TZ:-Europe/Rome}
      - APP_VERSION=${APP_VERSION}
      - SATOSA_UNKNOW_ERROR_REDIRECT_PAGE=${SATOSA_UNKNOW_ERROR_REDIRECT_PAGE}
      - SATOSA_CANCEL_REDIRECT_URL=${SATOSA_CANCEL_REDIRECT_URL}
    volumes:
      # File statici SATOSA (disco.html, wallets, etc.) popolati da iam-proxy-italia/startup.sh
      - iam_proxy_static:/satosa-project/static:ro
      # Cert TLS per-dominio (personalizzazione per-comune)
      - ./ssl:/etc/nginx/certs
    restart: unless-stopped
    networks:
      - govpay-network
  db:
    image: ghcr.io/comune-di-montesilvano/govpay-interaction-layer-db:${APP_VERSION:-latest}
    container_name: mariadb
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - DB_USER_CITTADINI=${DB_USER_CITTADINI}
      - DB_PASSWORD_CITTADINI=${DB_PASSWORD_CITTADINI}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - govpay-network

  satosa-mongo:
    image: mongo:7
    container_name: satosa-mongo
    profiles:
      - iam-proxy
    environment:
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
