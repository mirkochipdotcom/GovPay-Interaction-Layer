services:
  govpay-interaction-backoffice:
    build:
      context: .
      target: runtime-backoffice
    image: govpay-interaction-backoffice:latest
    container_name: govpay-interaction-backoffice
    ports:
      - "${BACKOFFICE_HTTP_PORT:-8443}:80"
    volumes:
      # Monta solo la cartella debug per sviluppo live
      - ./debug:/var/www/html/public/debug
      - ./VERSION:/var/www/html/VERSION:ro
      - frontoffice_sp_metadata:/var/www/html/metadata-sp:ro
      - frontoffice_sp_metadata:/metadata/sp:ro
      - ./scripts:/var/www/html/scripts
    environment:
      - SSL=${SSL}
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME}
      - COMPOSER_VENDOR_DIR=/var/www/html/vendor
      - APP_SUITE=backoffice
      - APP_DEBUG=${APP_DEBUG}
      - ENABLE_DEBUG_TOOL=${ENABLE_DEBUG_TOOL}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_SUFFIX=${APP_ENTITY_SUFFIX}
      - APP_ENTITY_GOVERNMENT=${APP_ENTITY_GOVERNMENT}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_SUPPORT_PHONE=${APP_SUPPORT_PHONE}
      - APP_SUPPORT_HOURS=${APP_SUPPORT_HOURS}
      - APP_SUPPORT_LOCATION=${APP_SUPPORT_LOCATION}
      - APP_LOGO_SRC=${APP_LOGO_SRC}
      - APP_LOGO_TYPE=${APP_LOGO_TYPE}
      - ID_DOMINIO=${ID_DOMINIO}
      - ID_A2A=${ID_A2A}
      - URL_ENTE=${URL_ENTE}
      - PAGOPA_CHECKOUT_EC_BASE_URL=${PAGOPA_CHECKOUT_EC_BASE_URL}
      - PAGOPA_CHECKOUT_SUBSCRIPTION_KEY=${PAGOPA_CHECKOUT_SUBSCRIPTION_KEY}
      - PAGOPA_CHECKOUT_COMPANY_NAME=${PAGOPA_CHECKOUT_COMPANY_NAME}
      - PAGOPA_CHECKOUT_RETURN_OK_URL=${PAGOPA_CHECKOUT_RETURN_OK_URL}
      - PAGOPA_CHECKOUT_RETURN_CANCEL_URL=${PAGOPA_CHECKOUT_RETURN_CANCEL_URL}
      - PAGOPA_CHECKOUT_RETURN_ERROR_URL=${PAGOPA_CHECKOUT_RETURN_ERROR_URL}
      - PAGOPA_PAYMENT_OPTIONS_URL=${PAGOPA_PAYMENT_OPTIONS_URL}
      - PAGOPA_PAYMENT_OPTIONS_KEY=${PAGOPA_PAYMENT_OPTIONS_KEY}
      - GOVPAY_PENDENZE_URL=${GOVPAY_PENDENZE_URL}
      - GOVPAY_PAGAMENTI_URL=${GOVPAY_PAGAMENTI_URL}
      - GOVPAY_RAGIONERIA_URL=${GOVPAY_RAGIONERIA_URL}
      - GOVPAY_BACKOFFICE_URL=${GOVPAY_BACKOFFICE_URL}
      - GOVPAY_PENDENZE_PATCH_URL=${GOVPAY_PENDENZE_PATCH_URL}
      - AUTHENTICATION_GOVPAY=${AUTHENTICATION_GOVPAY}
      - BIZ_EVENTS_API_KEY=${BIZ_EVENTS_API_KEY}
      - BIZ_EVENTS_HOST=${BIZ_EVENTS_HOST}
      - BACKOFFICE_MAILER_DSN=${BACKOFFICE_MAILER_DSN}
      - BACKOFFICE_MAILER_FROM_ADDRESS=${BACKOFFICE_MAILER_FROM_ADDRESS}
      - BACKOFFICE_MAILER_FROM_NAME=${BACKOFFICE_MAILER_FROM_NAME}
      - BACKOFFICE_PUBLIC_BASE_URL=${BACKOFFICE_PUBLIC_BASE_URL}
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - GOVPAY_USER=${GOVPAY_USER}
      - GOVPAY_PASSWORD=${GOVPAY_PASSWORD}
      - GOVPAY_TLS_CERT=${GOVPAY_TLS_CERT}
      - GOVPAY_TLS_KEY=${GOVPAY_TLS_KEY}
      - TASSONOMIE_PAGOPA=${TASSONOMIE_PAGOPA}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # env_file_ rimosso per sicurezza (isolamento esplicito)
      # - .env.backoffice (rimosso: mantenere solo .env locale)
    depends_on:
      - db
    entrypoint: [ "/usr/local/bin/docker-setup.sh" ] # Esegue script di setup (composer/autoload + cert) poi CMD apache
    restart: unless-stopped
    networks:
      - govpay-network
  govpay-interaction-frontoffice:
    build:
      context: .
      target: runtime-frontoffice
    image: govpay-interaction-frontoffice:latest
    container_name: govpay-interaction-frontoffice
    ports:
      - "${FRONTOFFICE_HTTP_PORT:-8444}:80"
    volumes:
      # Monta solo la cartella debug per sviluppo live
      - ./debug:/var/www/html/public/debug
      - ./VERSION:/var/www/html/VERSION:ro
      - frontoffice_sp_metadata:/var/www/html/metadata-sp:ro
      - frontoffice_sp_metadata:/metadata/sp:ro
      - spid_certs:/var/www/html/spid-certs:ro
    environment:
      - SSL=${SSL}
      - APACHE_SERVER_NAME=${APACHE_SERVER_NAME}
      - COMPOSER_VENDOR_DIR=/var/www/html/vendor
      - APP_DEBUG=${APP_DEBUG}
      - ENABLE_DEBUG_TOOL=${ENABLE_DEBUG_TOOL}
      - APP_SUITE=frontoffice
      - DB_NAME=${DB_NAME_CITTADINI}
      - DB_USER=${DB_USER_CITTADINI}
      - DB_PASSWORD=${DB_PASSWORD_CITTADINI}
      - FRONTOFFICE_AUTH_PROXY_TYPE=${FRONTOFFICE_AUTH_PROXY_TYPE:-iam-proxy-saml2}
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - APP_ENTITY_IPA_CODE=${APP_ENTITY_IPA_CODE}
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_SUFFIX=${APP_ENTITY_SUFFIX}
      - APP_ENTITY_GOVERNMENT=${APP_ENTITY_GOVERNMENT}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_SUPPORT_PHONE=${APP_SUPPORT_PHONE}
      - APP_SUPPORT_HOURS=${APP_SUPPORT_HOURS}
      - APP_SUPPORT_LOCATION=${APP_SUPPORT_LOCATION}
      - APP_LOGO_SRC=${APP_LOGO_SRC}
      - APP_LOGO_TYPE=${APP_LOGO_TYPE}
      - ID_DOMINIO=${ID_DOMINIO}
      - ID_A2A=${ID_A2A}
      - URL_ENTE=${URL_ENTE}
      - PAGOPA_CHECKOUT_EC_BASE_URL=${PAGOPA_CHECKOUT_EC_BASE_URL}
      - PAGOPA_CHECKOUT_SUBSCRIPTION_KEY=${PAGOPA_CHECKOUT_SUBSCRIPTION_KEY}
      - PAGOPA_CHECKOUT_COMPANY_NAME=${PAGOPA_CHECKOUT_COMPANY_NAME}
      - PAGOPA_CHECKOUT_RETURN_OK_URL=${PAGOPA_CHECKOUT_RETURN_OK_URL}
      - PAGOPA_CHECKOUT_RETURN_CANCEL_URL=${PAGOPA_CHECKOUT_RETURN_CANCEL_URL}
      - PAGOPA_CHECKOUT_RETURN_ERROR_URL=${PAGOPA_CHECKOUT_RETURN_ERROR_URL}
      - PAGOPA_PAYMENT_OPTIONS_URL=${PAGOPA_PAYMENT_OPTIONS_URL}
      - PAGOPA_PAYMENT_OPTIONS_KEY=${PAGOPA_PAYMENT_OPTIONS_KEY}
      - GOVPAY_PENDENZE_URL=${GOVPAY_PENDENZE_URL}
      - GOVPAY_PAGAMENTI_URL=${GOVPAY_PAGAMENTI_URL}
      - GOVPAY_RAGIONERIA_URL=${GOVPAY_RAGIONERIA_URL}
      - GOVPAY_BACKOFFICE_URL=${GOVPAY_BACKOFFICE_URL}
      - GOVPAY_PENDENZE_PATCH_URL=${GOVPAY_PENDENZE_PATCH_URL}
      - AUTHENTICATION_GOVPAY=${AUTHENTICATION_GOVPAY}
      - GOVPAY_USER=${GOVPAY_USER}
      - GOVPAY_PASSWORD=${GOVPAY_PASSWORD}
      - GOVPAY_TLS_CERT=${GOVPAY_TLS_CERT}
      - GOVPAY_TLS_KEY=${GOVPAY_TLS_KEY}
      - TASSONOMIE_PAGOPA=${TASSONOMIE_PAGOPA}
      - COMPOSE_PROFILES=${COMPOSE_PROFILES}
      - IAM_PROXY_SAML2_IDP_METADATA_URL_INTERNAL=${IAM_PROXY_SAML2_IDP_METADATA_URL_INTERNAL:-http://satosa-nginx:80/Saml2IDP/metadata}
      - IAM_PROXY_PUBLIC_BASE_URL=${IAM_PROXY_PUBLIC_BASE_URL}
      - IAM_PROXY_DEBUG=${IAM_PROXY_DEBUG:-false}
    depends_on:
      - db
    entrypoint: [ "/usr/local/bin/docker-setup.sh" ]
    restart: unless-stopped
    networks:
      - govpay-network

  sync-iam-proxy:
    image: alpine:latest
    container_name: sync-iam-proxy
    environment:
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_LOGO_SRC=${APP_LOGO_SRC}
      - APP_LOGO_TYPE=${APP_LOGO_TYPE}
      - APP_VERSION=${APP_VERSION}
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
    env_file:
      - .iam-proxy.env
    volumes:
      - ./VERSION:/VERSION:ro
      - ./iam-proxy:/iam-proxy
      - ./scripts:/scripts:ro
      - ./metadata/cieoidc-keys:/metadata/cieoidc-keys:ro
    working_dir: /scripts
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache bash git curl unzip openssl gettext python3
        bash /scripts/sync-iam-proxy-italia.sh
    profiles:
      - iam-proxy

  init-frontoffice-sp-metadata:
    image: govpay-interaction-frontoffice:latest
    container_name: init-frontoffice-sp-metadata
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sh /scripts/ensure-sp-metadata.sh
    volumes:
      - ./metadata/ensure-sp-metadata.sh:/scripts/ensure-sp-metadata.sh:ro
      - frontoffice_sp_metadata:/metadata/sp
      - frontoffice_sp_metadata:/var/www/html/metadata-sp
      - spid_certs:/var/www/html/spid-certs:ro
    environment:
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS=${FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS:-365}
      - FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS=${FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS:-604800}
      - FRONTOFFICE_SAML_SP_X509CERT=/var/www/html/spid-certs/cert.pem
      - FRONTOFFICE_SAML_SP_PRIVATEKEY=/var/www/html/spid-certs/privkey.pem
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_SUFFIX=${APP_ENTITY_SUFFIX}
      - APP_ENTITY_IPA_CODE=${APP_ENTITY_IPA_CODE}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_SUPPORT_PHONE=${APP_SUPPORT_PHONE}
      - ID_DOMINIO=${ID_DOMINIO}
    profiles:
      - iam-proxy

  refresh-frontoffice-sp-metadata:
    image: govpay-interaction-frontoffice:latest
    container_name: refresh-frontoffice-sp-metadata
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          sh /scripts/ensure-sp-metadata.sh || true
          sleep ${FRONTOFFICE_SP_METADATA_REFRESH_SECONDS:-21600}
        done
    volumes:
      - ./metadata/ensure-sp-metadata.sh:/scripts/ensure-sp-metadata.sh:ro
      - frontoffice_sp_metadata:/metadata/sp
      - frontoffice_sp_metadata:/var/www/html/metadata-sp
      - spid_certs:/var/www/html/spid-certs:ro
    environment:
      - FRONTOFFICE_PUBLIC_BASE_URL=${FRONTOFFICE_PUBLIC_BASE_URL}
      - FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS=${FRONTOFFICE_SAML_SP_METADATA_VALIDITY_DAYS:-365}
      - FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS=${FRONTOFFICE_SAML_SP_METADATA_CACHE_DURATION_SECONDS:-604800}
      - FRONTOFFICE_SAML_SP_X509CERT=/var/www/html/spid-certs/cert.pem
      - FRONTOFFICE_SAML_SP_PRIVATEKEY=/var/www/html/spid-certs/privkey.pem
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_SUFFIX=${APP_ENTITY_SUFFIX}
      - APP_ENTITY_IPA_CODE=${APP_ENTITY_IPA_CODE}
      - APP_ENTITY_URL=${APP_ENTITY_URL}
      - APP_SUPPORT_EMAIL=${APP_SUPPORT_EMAIL}
      - APP_SUPPORT_PHONE=${APP_SUPPORT_PHONE}
      - ID_DOMINIO=${ID_DOMINIO}
    depends_on:
      init-frontoffice-sp-metadata:
        condition: service_completed_successfully
    restart: unless-stopped
    profiles:
      - iam-proxy

  iam-proxy-italia:
    image: ghcr.io/italia/iam-proxy-italia:latest
    container_name: iam-proxy-italia
    command:
      - /bin/bash
      - -c
      - |
        # Watchdog sulla scadenza del metadata SP del Frontoffice caricato da SATOSA.
        # Non riguarda i metadata pubblici di SATOSA (/Saml2IDP/metadata, /spidSaml2/metadata).
        FRONTOFFICE_SP_METADATA_FILE="$${FRONTOFFICE_SP_METADATA_FILE:-/satosa_proxy/metadata/sp/frontoffice_sp.xml}"
        FRONTOFFICE_SP_METADATA_WARN_WINDOW_SECONDS="$${FRONTOFFICE_SP_METADATA_WARN_WINDOW_SECONDS:-604800}"
        FRONTOFFICE_SP_METADATA_CHECK_INTERVAL_SECONDS="$${FRONTOFFICE_SP_METADATA_CHECK_INTERVAL_SECONDS:-21600}"

        metadata_expiry_watchdog() {
          while true; do
            python - "$$FRONTOFFICE_SP_METADATA_FILE" "$$FRONTOFFICE_SP_METADATA_WARN_WINDOW_SECONDS" <<'PY'
        import datetime as dt
        import os
        import sys
        import xml.etree.ElementTree as ET

        metadata_file = sys.argv[1]
        warn_window = int(sys.argv[2])

        def log_error(msg: str):
          print(f"[ERROR] [metadata-expiry-watchdog] {msg}", flush=True)

        if not os.path.exists(metadata_file):
          log_error(f"metadata file not found: {metadata_file}")
          sys.exit(0)

        try:
          root = ET.parse(metadata_file).getroot()
          valid_until_raw = root.attrib.get("validUntil", "").strip()
          if not valid_until_raw:
            log_error(f"validUntil missing in metadata: {metadata_file}")
            sys.exit(0)

          # Accept format like 2026-03-18T15:25:24Z
          valid_until = dt.datetime.strptime(valid_until_raw, "%Y-%m-%dT%H:%M:%SZ").replace(tzinfo=dt.timezone.utc)
          now = dt.datetime.now(dt.timezone.utc)
          remaining = int((valid_until - now).total_seconds())

          if remaining <= warn_window:
            days = remaining // 86400
            hours = (remaining % 86400) // 3600
            if remaining <= 0:
              log_error(f"SP metadata EXPIRED at {valid_until_raw} (file={metadata_file})")
            else:
              log_error(
                f"SP metadata expires soon at {valid_until_raw} (remaining={remaining}s ~ {days}d {hours}h, file={metadata_file})"
              )
        except Exception as ex:
          log_error(f"cannot parse metadata expiry from {metadata_file}: {ex}")
        PY
            sleep "$$FRONTOFFICE_SP_METADATA_CHECK_INTERVAL_SECONDS"
          done
        }

        if [ "$$FRONTOFFICE_SP_METADATA_CHECK_INTERVAL_SECONDS" -gt 0 ] 2>/dev/null; then
          metadata_expiry_watchdog &
        fi

        if [ -f /satosa_proxy/patch_saml2.py ]; then
          echo "[INFO] Applying SAML2 patch..."
          python /satosa_proxy/patch_saml2.py
        fi

        if [ -f /satosa_proxy/entrypoint.sh ]; then
          exec /bin/bash /satosa_proxy/entrypoint.sh
        else
          echo "[ERROR] /satosa_proxy/entrypoint.sh not found. Volume mount issue?"
          exit 1
        fi
    volumes:
      - ./iam-proxy/iam-proxy-italia-project:/satosa_proxy
      - ./iam-proxy/patch_saml2.py:/satosa_proxy/patch_saml2.py:ro
      - frontoffice_sp_metadata:/satosa_proxy/metadata/sp:ro
      - spid_certs:/satosa_proxy/pki
    profiles:
      - iam-proxy
    depends_on:
      sync-iam-proxy:
        condition: service_completed_successfully
      init-frontoffice-sp-metadata:
        condition: service_completed_successfully
    environment:
      # Config minima per esecuzione container (valori dettagliati/secret in .env)
      - SATOSA_BY_DOCKER=1
      - APP_ENTITY_NAME=${APP_ENTITY_NAME}
      - APP_ENTITY_IPA_CODE=${APP_ENTITY_IPA_CODE}
    env_file:
      # - .env.frontoffice (rimosso: usare .env e .iam-proxy.env)
      - .iam-proxy.env
    restart: on-failure:3
    healthcheck:
      test: [ "CMD", "test", "-f", "/satosa_proxy/entrypoint.sh" ]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 10s
    networks:
      - govpay-network

  satosa-nginx:
    image: nginx:alpine
    container_name: satosa-nginx
    profiles:
      - iam-proxy
    depends_on:
      iam-proxy-italia:
        condition: service_started
    ports:
      - "${IAM_PROXY_HTTP_PORT:-9445}:80"
    environment:
      - SSL=${SSL:-on}
      - NGINX_HOST=${IAM_PROXY_HOSTNAME:-satosa-nginx}
      - TZ=${TZ:-Europe/Rome}
    env_file:
      # Permette a nginx di leggere SATOSA_UNKNOW_ERROR_REDIRECT_PAGE
      # per configurare il redirect su errori 403 (es. annullamento login SPID/CIE)
      - .iam-proxy.env
    volumes:
      - ./iam-proxy/nginx/conf.d:/satosa_config_templates:ro
      - ./iam-proxy/nginx/html:/usr/share/nginx/html:ro
      - ./iam-proxy/nginx/entrypoint.d:/docker-entrypoint.d:ro
      # Mount SATOSA static files for serving by nginx
      - ./iam-proxy/iam-proxy-italia-project/static:/usr/share/nginx/html/static:ro
      # Versione applicazione per footer pagine errore
      - ./VERSION:/VERSION:ro
      # Cert per TLS (riuso di ssl/ locale)
      - ./ssl:/etc/nginx/certs
    restart: unless-stopped
    networks:
      - govpay-network
  db:
    image: mariadb:11
    container_name: mariadb
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - DB_USER_CITTADINI=${DB_USER_CITTADINI}
      - DB_PASSWORD_CITTADINI=${DB_PASSWORD_CITTADINI}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - govpay-network

  satosa-mongo:
    image: mongo:7
    container_name: satosa-mongo
    profiles:
      - iam-proxy
    env_file:
      - .iam-proxy.env
    volumes:
      - satosa_mongo_data:/data/db
    restart: unless-stopped
    networks:
      - govpay-network

networks:
  govpay-network:
    driver: bridge

volumes:
  db_data:
  satosa_mongo_data:
  frontoffice_sp_metadata:
  spid_certs:
    external: true
    name: ${SPID_CERTS_DOCKER_VOLUME:-govpay_spid_certs}
