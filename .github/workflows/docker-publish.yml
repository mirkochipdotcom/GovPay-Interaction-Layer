name: Docker Publish

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: comune-di-montesilvano

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── backoffice ──────────────────────────────────────────────────────
      - name: Meta · backoffice
        id: meta-bo
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-backoffice
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push · backoffice
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-backoffice
          push: true
          tags: ${{ steps.meta-bo.outputs.tags }}
          labels: ${{ steps.meta-bo.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── frontoffice ─────────────────────────────────────────────────────
      - name: Meta · frontoffice
        id: meta-fo
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-frontoffice
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push · frontoffice
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime-frontoffice
          push: true
          tags: ${{ steps.meta-fo.outputs.tags }}
          labels: ${{ steps.meta-fo.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── iam-proxy-sync ──────────────────────────────────────────────────
      - name: Meta · iam-proxy-sync
        id: meta-sync
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-iam-proxy-sync
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push · iam-proxy-sync
        uses: docker/build-push-action@v6
        with:
          context: .
          file: iam-proxy/sync/Dockerfile
          push: true
          tags: ${{ steps.meta-sync.outputs.tags }}
          labels: ${{ steps.meta-sync.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── iam-proxy-nginx ─────────────────────────────────────────────────
      - name: Meta · iam-proxy-nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-iam-proxy-nginx
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push · iam-proxy-nginx
        uses: docker/build-push-action@v6
        with:
          context: iam-proxy/nginx
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── db ──────────────────────────────────────────────────────────────
      - name: Meta · db
        id: meta-db
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-db
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push · db
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/db/Dockerfile
          push: true
          tags: ${{ steps.meta-db.outputs.tags }}
          labels: ${{ steps.meta-db.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── metadata-builder ────────────────────────────────────────────────
      - name: Meta · metadata-builder
        id: meta-mb
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.ORG }}/govpay-interaction-layer-metadata-builder
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push · metadata-builder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: metadata/builder/Dockerfile
          push: true
          tags: ${{ steps.meta-mb.outputs.tags }}
          labels: ${{ steps.meta-mb.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
